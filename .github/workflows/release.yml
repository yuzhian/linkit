name: 自动发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    name: 构建并发布 - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linkit
            asset_name: linkit-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: linkit.exe
            asset_name: linkit-windows-x86_64.exe

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 环境
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 编译 Release 版本
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: 准备分发文件 (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p assets
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} assets/${{ matrix.asset_name }}

      - name: 准备分发文件 (Windows)
        if: runner.os == 'Windows'
        run: |
          if (!(Test-Path assets)) { New-Item -ItemType Directory -Path assets }
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.artifact_name }}" -Destination "assets\${{ matrix.asset_name }}"

      - name: 发布至 GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
